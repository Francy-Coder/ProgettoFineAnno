
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:13px;color:var(--color-text-primary)}
.root{padding:16px 0 24px}
.section{margin-bottom:6px}
.section-header{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:var(--border-radius-md);cursor:pointer;user-select:none;font-weight:500;font-size:13px;transition:background .15s}
.section-header:hover{background:var(--color-background-secondary)}
.section-header .ti{font-size:15px;width:18px;text-align:center}
.chevron{margin-left:auto;font-size:11px;color:var(--color-text-tertiary);transition:transform .2s}
.open .chevron{transform:rotate(90deg)}
.children{overflow:hidden;padding-left:28px;border-left:1.5px solid var(--color-border-tertiary);margin-left:20px}
.children.hidden{display:none}
.file{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:var(--border-radius-md);cursor:pointer;transition:background .15s;line-height:1.4}
.file:hover{background:var(--color-background-secondary)}
.file .ti{font-size:13px;width:16px;text-align:center}
.fname{font-weight:400;color:var(--color-text-primary)}
.fext{font-size:11px;color:var(--color-text-tertiary);margin-left:2px}
.fdesc{font-size:11px;color:var(--color-text-secondary);margin-left:auto;text-align:right;max-width:200px}
.badge{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:500;white-space:nowrap}
.b-java{background:#FFF3CD;color:#856404}
.b-xml{background:#D1ECF1;color:#0C5460}
.b-sql{background:#D4EDDA;color:#155724}
.b-kt{background:#E2D9F3;color:#5E35B1}
.b-prop{background:#F8D7DA;color:#721c24}

.panel{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:14px 16px;margin:12px 0 6px;border:1px solid var(--color-border-tertiary)}
.panel h3{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.legend{display:flex;flex-wrap:wrap;gap:8px}
.owner{display:flex;align-items:center;gap:6px;font-size:12px}
.dot{width:10px;height:10px;border-radius:50%}

.info-box{display:none;background:var(--color-background-primary);border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:12px 14px;margin:4px 0 2px;font-size:12px;line-height:1.6;color:var(--color-text-secondary)}
.info-box.show{display:block}
.info-box strong{color:var(--color-text-primary);font-weight:500}
.info-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
</style>

let selected = null;

function badge(b){
  const map={java:'b-java',xml:'b-xml',sql:'b-sql',kt:'b-kt',prop:'b-prop'};
  if(!b) return '';
  return `<span class="badge ${map[b]||''}">${b}</span>`;
}

function colorDot(c){
  if(!c) return '';
  return `<span style="width:8px;height:8px;border-radius:50%;background:${c};display:inline-block;flex-shrink:0"></span>`;
}

function buildInfo(node){
  if(!node.info) return '';
  const {owner,desc,files} = node.info;
  return `<div class="info-box" id="info-${node.id}">
    <strong>${owner}</strong> — ${desc}
    <div class="info-row">${files.map(f=>`<span class="badge b-java" style="background:var(--color-background-secondary);color:var(--color-text-secondary)">${f}</span>`).join('')}</div>
  </div>`;
}

function buildNode(node, depth=0){
  if(node.children){
    const childrenHtml = node.children.map(c=>buildNode(c,depth+1)).join('');
    const id = 'sec-'+node.id;
    const open = node.open;
    return `<div class="section">
      <div class="section-header ${open?'open':''}" onclick="toggleSection('${id}')">
        <span style="font-size:15px">${node.label}</span>
        ${node.subtitle?`<span style="font-size:11px;color:var(--color-text-tertiary);font-weight:400">${node.subtitle}</span>`:''}
        <span class="chevron ti ti-chevron-right"></span>
      </div>
      <div class="children ${open?'':'hidden'}" id="${id}">
        ${childrenHtml}
      </div>
    </div>`;
  } else {
    return `<div>
      <div class="file" onclick="toggleInfo('${node.id}')">
        ${node.color?colorDot(node.color):''}
        <i class="ti ${node.icon||'ti-file'}" style="color:var(--color-text-secondary);${node.color?'color:'+node.color:''}"></i>
        <span class="fname">${node.label}<span class="fext">${node.ext||''}</span></span>
        ${badge(node.badge)}
        <span class="fdesc">${node.desc||''}</span>
      </div>
      ${buildInfo(node)}
    </div>`;
  }
}

function toggleSection(id){
  const el = document.getElementById(id);
  const hdr = el.previousElementSibling;
  const hidden = el.classList.toggle('hidden');
  hdr.classList.toggle('open', !hidden);
}

function toggleInfo(id){
  const box = document.getElementById('info-'+id);
  if(!box) return;
  const showing = box.classList.toggle('show');
  if(showing && selected && selected!==id){
    const prev = document.getElementById('info-'+selected);
    if(prev) prev.classList.remove('show');
  }
  selected = showing ? id : null;
}

document.getElementById('tree').innerHTML = data.map(n=>buildNode(n)).join('');
</script>
